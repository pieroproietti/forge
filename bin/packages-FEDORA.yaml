#cloud-config
package_update: true
package_upgrade: true
packages:
  - go
  - rpm-build
  - rpmdevtools
  - openssh-server
  - rsync
  - git
  - make
  - gcc
  - gcc-c++
  - binutils
  - patch
  - autoconf
  - automake
  - libtool
runcmd:
  - systemctl enable --now sshd
  - firewall-cmd --add-service=ssh --permanent
  - firewall-cmd --reload
